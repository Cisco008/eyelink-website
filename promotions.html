<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Promotions - Eyelink Mitchell's Plain</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
  <style>
    /* Shared Styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    
    /* Updated Navigation for Autofit */
    nav { 
      position: fixed; 
      width: 100%; 
      top: 0; 
      left: 0; 
      background: #fff; 
      padding: 10px 20px; 
      z-index: 1000; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
    }
    nav ul { 
      list-style: none; 
      display: flex; 
      justify-content: center; 
      flex-wrap: wrap; /* Allows links to wrap on small screens */
    }
    nav ul li { margin: 0 15px; }
    nav ul li a { 
      color: #000; 
      text-decoration: none; 
      font-weight: bold; 
      display: inline-block;
      padding: 5px 0;
    }

    /* Mobile Nav Logic for Android and iPhone */
    @media (max-width: 600px) {
      nav { padding: 8px 5px; }
      nav ul { justify-content: space-around; }
      nav ul li { 
        margin: 5px; 
        flex: 1 0 30%; /* 3 items across, then wraps */
        text-align: center; 
      }
      nav ul li a { 
        font-size: 13px; 
        padding: 10px 5px; 
        background: #f4f4f4; 
        border-radius: 4px; 
        display: block; 
        width: 100%; 
      }
    }

    section { padding: 120px 20px 80px; text-align: center; background: #f5faff; min-height: 100vh; }
    
    /* Adjusted top padding for mobile to account for wrapped nav */
    @media (max-width: 600px) {
      section { padding-top: 140px; }
    }

    .container { max-width: 1000px; margin: auto; }

    /* MAINTAINED IMAGE SIZES */
    .promo-img {
      width: 90%; /* Increased for better visibility on mobile */
      max-width: 280px;
      height: auto;
      margin: 20px auto;
      display: block;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      transition: transform 0.3s ease;
    }
    .promo-img:hover { transform: scale(1.05); }

    footer { background: #333; color: #fff; text-align: center; padding: 20px; }
    .social-media a { color: #fff; margin: 0 10px; font-size: 24px; }
  </style>
</head>
<body>

  <nav>
    <ul>
      <li><a href="index.html#home">Home</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#services">Services</a></li>
      <li><a href="index.html#contact">Contact</a></li>
      <li><a href="promotions.html">Promotions</a></li>
    </ul>
  </nav>

  <section id="promotions">
    <div class="container">
      <h2>🔥 Current Promotions</h2>
      <img src="images/promo1.png" alt="Promo 1" class="promo-img">
      <img src="images/promo2.png" alt="Promo 2" class="promo-img">
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Eyelink Mitchells Plain. All rights reserved.</p>
    <div class="social-media">
      <a href="https://wa.me/27659289823" target="_blank"><i class="fab fa-whatsapp"></i></a>
      <a href="https://www.facebook.com/profile.php?id=61552788991942" target="_blank"><i class="fab fa-facebook"></i></a>
    </div>
  </footer>

</body>
</html>
